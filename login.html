<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Administrador</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/login.css">
  <script src="js/auth.js" defer></script>
</head>
<body>
  <header class="header">
    <h1>Ingreso Administrador</h1>

    <nav class="nav">
      <a href="index.html">Volver al home</a>
    </nav>
  </header>

  <main class="container">
    <section class="form-box">
    <h2>Iniciar sesión</h2>

    <img src="img/symbols/copa-mundial.jpg"
         class="login-logo"
         alt="Copa Mundial">

    <form id="loginForm">
      <label for="username">Usuario</label>
      <input type="text" id="username" placeholder="Usuario" required>

      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Contraseña" required>

      <button type="submit">Ingresar</button>
    </form>

    <p id="mensajeLogin" class="message"></p>

    <p class="help-text">
      Usuario de prueba: <strong>emilys</strong><br>
      Contraseña: <strong>emilyspass</strong>
    </p>
  </section>
  </main>

  <footer class="footer">
    <p>Trabajo Final - Taller de Internet 1</p>
  </footer>
</body>
</html>
